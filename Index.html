<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page-title">Investigación de materia prima</title>
  <link rel="stylesheet" href="style.css">
  <script src="i18n.js"></script>
</head>
<body class="creative-tool-page">
  <div class="page">
    <header class="page-header">
      <div class="page-header-main">
        <h1 data-i18n="page-title">Investigación de materia prima</h1>
        <p class="page-intro" data-i18n-html="page-intro"></p>
      </div>
      <div class="page-header-tools">
        <a class="page-header-link" href="http://43.134.115.245:8080" target="_blank" rel="noopener noreferrer" data-i18n="header-open-lera">Abrir metodología</a>
      </div>
    </header>

    <main class="step-page-container" id="step-page-container">
      <div class="step-page is-active" id="input-step-page">
        <div class="form-layout" id="form-layout">
      <section class="form-section" id="object-definition-section">
        <div class="section-header">
          <h2 data-i18n="section-1-title">I. Definición del objeto</h2>
          <p data-i18n-html="section-1-desc"></p>
        </div>

        <div class="section-body" id="object-definition-fields">
          <div class="field-group">
            <label for="ingredient-name" data-i18n="label-ingredient-name">¿Qué materia prima se quiere estudiar?</label>
            <input type="text" id="ingredient-name" name="ingredientName" data-i18n-placeholder="placeholder-ingredient-name" placeholder="Introducir nombre de la materia prima">
          </div>

          <div class="field-group">
            <label for="scientific-name" data-i18n="label-scientific-name">Nombre científico</label>
            <input type="text" id="scientific-name" name="scientificName" data-i18n-placeholder="placeholder-scientific-name" placeholder="Introducir nombre científico">
          </div>

          <div class="field-group">
            <span class="field-label" data-i18n="label-separable-part">¿Hay partes separables?</span>
            <div class="radio-group">
              <label>
                <input type="radio" id="has-separable-part-yes" name="hasSeparablePart" value="yes">
                <span data-i18n="option-yes">Sí</span>
              </label>
              <label>
                <input type="radio" id="has-separable-part-no" name="hasSeparablePart" value="no">
                <span data-i18n="option-no">No</span>
              </label>
            </div>
          </div>

          <div class="field-group" id="separable-parts-group">
            <label for="separable-parts" data-i18n="label-separable-parts-detail">Si la respuesta es sí, ¿qué partes pueden separarse?</label>
            <textarea id="separable-parts" name="separableParts" rows="3" data-i18n-placeholder="placeholder-separable-parts" placeholder="Por ejemplo: piel, grasa, músculo, semilla, hoja, raíz"></textarea>
          </div>

          <div class="field-group" id="study-object-group">
            <label for="study-object" data-i18n="label-study-object">Dentro de esta herramienta, ¿qué parte se elige como objeto de estudio?</label>
            <input type="text" id="study-object" name="studyObject" data-i18n-placeholder="placeholder-study-object" placeholder="Introducir objeto de estudio">
          </div>

          <div class="field-group action-group">
            <button type="button" id="ai-prefill-button" data-i18n="btn-ai-prefill">Relleno con IA</button>
          </div>
        </div>
      </section>

      <section class="form-section" id="composition-section">
        <div class="section-header">
          <h2 data-i18n="section-2-title">II. Composición</h2>
          <p data-i18n-html="section-2-desc"></p>
        </div>

        <div class="composition-summary" id="composition-summary" aria-live="polite"></div>
        <div class="section-body" id="composition-fields">
          <!-- Aquí se insertan: proteínas, grasas, azúcares, agua, pigmentos, enzimas, compuestos aromáticos, compuestos ácidos y componentes distintivos -->
        </div>
      </section>

      <section class="form-section" id="texture-section">
        <div class="section-header">
          <h2 data-i18n="section-3-title">III. Textura</h2>
          <p data-i18n="section-3-desc"></p>
        </div>

        <div class="section-body" id="texture-fields">
          <!-- Aquí se insertan: duro, blando y frágil, blando y elástico, crujiente -->
        </div>
      </section>

      <section class="form-section" id="judgement-section">
        <div class="section-header">
          <h2 data-i18n="section-4-title">IV. Criterios de juicio</h2>
          <p data-i18n-html="section-4-desc"></p>
        </div>

        <div class="section-body" id="judgement-fields">
          <!-- Aquí se insertan: sabor evidente, espacio rellenable, líquido extraíble, aceptación de cambio de forma y nuevas aplicaciones de técnicas tradicionales -->
        </div>
      </section>
        </div>

        <div class="page-action-bar">
          <button type="button" id="open-review-button" data-i18n="btn-next-step">Pasar al siguiente paso</button>
        </div>
      </div>

      <div class="step-page" id="review-step-page" hidden>
        <section class="form-section review-section" id="review-section">
          <div class="section-header">
            <h2 data-i18n="section-5-title">V. Confirmación del objeto analizado</h2>
            <p data-i18n="section-5-desc"></p>
          </div>

          <div class="section-body" id="review-panel-container">
            <!-- El contenido de revisión se genera dinámicamente desde reviewView.js -->
          </div>

          <div class="section-body review-action-group">
            <button type="button" id="review-back-button" data-i18n="btn-back-modify">Volver a editar</button>
            <button type="button" id="review-continue-button" data-i18n="btn-continue-next">Continuar</button>
          </div>
        </section>
      </div>

      <div class="step-page" id="result-step-page" hidden>
        <section class="form-section result-section" id="result-section">
          <div class="section-header">
            <h2 data-i18n="section-6-title">VI. Resultado técnico</h2>
            <p data-i18n="section-6-desc"></p>
          </div>

          <div class="section-body" id="result-panel-container">
            <!-- El contenido del resultado técnico se genera dinámicamente desde resultView.js -->
          </div>

          <div class="section-body result-action-group">
            <button type="button" id="result-back-button" data-i18n="btn-back-confirm">Volver a confirmar</button>
            <button type="button" id="open-summary-button" data-i18n="btn-open-summary">Generar resumen y lista completa</button>
          </div>
        </section>
      </div>

      <div class="step-page" id="summary-step-page" hidden>
        <section class="form-section summary-section" id="summary-section">
          <div class="section-header">
            <h2 data-i18n="section-7-title">VII. Resumen y lista completa</h2>
            <p data-i18n="section-7-desc"></p>
          </div>

          <div class="section-body" id="summary-panel-container">
            <!-- El contenido del resumen y de la lista completa se genera dinámicamente desde summaryView.js -->
          </div>

          <div class="section-body summary-action-group">
            <button type="button" id="summary-back-button" data-i18n="btn-back-results">Volver a resultados</button>
            <button type="button" id="summary-print-button" data-i18n="btn-save-pdf">Guardar PDF</button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="resultData.js"></script>
  <script src="rules.js"></script>
  <script src="techniqueDescriptions.js"></script>
  <script src="app.js"></script>
  <script src="prompt.js"></script>
  <script src="ai.js"></script>
  <script src="stateCollector.js"></script>
  <script src="reviewFormatter.js"></script>
  <script src="reviewView.js"></script>
  <script src="normalizer.js"></script>
  <script src="engine.js"></script>
  <script src="resultView.js"></script>
  <script src="summaryView.js"></script>
  <script src="i18nUtils.js"></script>
</body>
</html>
